site_name: Hardwood
site_description: A lightweight Java Parquet reader — zero transitive dependencies, GraalVM-friendly, S3 without Hadoop
site_url: https://hardwood.dev/
repo_url: https://github.com/hardwood-hq/hardwood
repo_name: hardwood-hq/hardwood
edit_uri: edit/main/docs/content/

docs_dir: content

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Usage: usage.md
  - CLI: cli.md
  - Modules:
    - S3: s3.md
    - Avro: avro.md
    - Parquet-Java Compatibility: compat.md
  - API Reference: /api/latest/
  - Release Notes: release-notes.md
  - Contributing: contributing.md

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

hooks:
  - hooks/git_commit.py
  - hooks/page_variables.py

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

copyright: >-
  Licensed under
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">Creative Commons BY-SA 4.0</a>

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  version:
    provider: mike
    alias: true
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hardwood-hq/hardwood
  # Latest released version, substituted into Maven/Gradle examples in the
  # docs via the {{hardwood_version}} placeholder. Updated by release.sh.
  hardwood_version: 1.0.0.Beta2
  # GitHub release tag the CLI download link points at. Updated by release.sh
  # for the tagged docs build; main keeps it at the rolling early-access tag.
  cli_release_tag: 1.0-early-access
