project.version=${project.version}
project.revision=${revision}
project.revision.dirty=${revisionDirty}
quarkus.banner.enabled=false
quarkus.package.output-name=hardwood
quarkus.package.runner-suffix=-cli
quarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:25.0.2.0-Final-java25
quarkus.native.additional-build-args=-march=compatibility,--gc=serial,-J--enable-native-access=ALL-UNNAMED,--initialize-at-run-time=org.apache.logging.log4j.core.config.yaml.YamlConfiguration,--initialize-at-run-time=org.jline.nativ,--initialize-at-run-time=org.jline.terminal.impl.jni
%prod.quarkus.log.level=ERROR
%test.quarkus.log.level=ERROR
