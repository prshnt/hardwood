name: Release

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Release version'
        required: true
      development-version:
        description: 'Development version'
        required: true
      stage:
        description: 'Stage ("UPLOAD" deploys to a staging repo, "FULL" publishes right away)'
        required: true
        type: choice
        options:
          - 'UPLOAD'
          - 'FULL'
      publish-cli:
        description: 'Build and publish native CLI binaries'
        required: true
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Configure git for CI'
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Action"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Build Maven Central bearer token'
        if: inputs.stage == 'UPLOAD'
        run: |
          MAVEN_CENTRAL_BEARER_TOKEN=$(printf "%s:%s" "$MAVENCENTRAL_USERNAME" "$MAVENCENTRAL_TOKEN" | base64 -w 0)
          echo "::add-mask::$MAVEN_CENTRAL_BEARER_TOKEN"
          echo "MAVEN_CENTRAL_BEARER_TOKEN=$MAVEN_CENTRAL_BEARER_TOKEN" >> "$GITHUB_ENV"
        env:
          MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_TOKEN }}

      - name: 'Release'
        run: ./release.sh "${{ inputs.release-version }}" "${{ inputs.development-version }}" "${{ inputs.stage }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'API change report'
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: japicmp-report
          path: core/target/japicmp/

      - name: 'JReleaser output'
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: jreleaser-release
          path: |
            target/checkout/target/jreleaser/trace.log
            target/checkout/target/jreleaser/output.properties


  # Build native executable per runner
  package:
    if: inputs.publish-cli
    needs: release
    name: 'Build with Graal on ${{ matrix.os }}'
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-26-intel, macos-26, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          ref: v${{ inputs.release-version }}
          submodules: 'true'

      - name: 'Add Developer Command Prompt for Microsoft Visual C++'
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1 — https://github.com/ilammy/msvc-dev-cmd/releases/tag/v1

      - name: 'Set up Graal'
        uses: graalvm/setup-graalvm@03e8abf916fd0e281b2efe7b2da3378bb0a1d085  # v1 — https://github.com/graalvm/setup-graalvm/releases/tag/v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: 'Build Native Image'
        run: ./mvnw -ntp -B -Dnative package -pl cli -am -DskipTests "-Ddist.qualifier=${{ inputs.release-version }}"

      - name: 'Upload build artifact (tar.gz)'
        if: ${{ runner.os != 'Windows' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: artifacts-${{ runner.os }}-${{ runner.arch }}
          path: cli/target/*.tar.gz

      - name: 'Upload build artifact (zip)'
        if: ${{ runner.os == 'Windows' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: artifacts-${{ runner.os }}-${{ runner.arch }}
          path: cli/target/*.zip

  # Attach CLI binaries to the GitHub release
  publish-cli:
    if: inputs.publish-cli
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 'Download all build artifacts'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8 — https://github.com/actions/download-artifact/releases/tag/v8
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: 'Attach CLI binaries to release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "v${{ inputs.release-version }}" artifacts/*
