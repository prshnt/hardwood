name: Release

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Release version'
        required: true
      development-version:
        description: 'Development version'
        required: true
      stage:
        description: 'Stage ("UPLOAD" deploys to a staging repo, "FULL" publishes right away)'
        required: true
        type: choice
        options:
          - 'UPLOAD'
          - 'FULL'
      release-cli:
        description: 'Build and publish native CLI binaries'
        required: true
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 'Check out repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 — https://github.com/actions/checkout/releases/tag/v6
        with:
          submodules: 'true'

      - name: 'Set up Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5 — https://github.com/actions/setup-java/releases/tag/v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Configure git for CI'
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Action"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Build Maven Central bearer token'
        if: inputs.stage == 'UPLOAD'
        run: |
          MAVEN_CENTRAL_BEARER_TOKEN=$(printf "%s:%s" "$MAVENCENTRAL_USERNAME" "$MAVENCENTRAL_TOKEN" | base64 -w 0)
          echo "::add-mask::$MAVEN_CENTRAL_BEARER_TOKEN"
          echo "MAVEN_CENTRAL_BEARER_TOKEN=$MAVEN_CENTRAL_BEARER_TOKEN" >> "$GITHUB_ENV"
        env:
          MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_TOKEN }}

      - name: 'Release'
        run: ./release.sh "${{ inputs.release-version }}" "${{ inputs.development-version }}" "${{ inputs.stage }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'API change report'
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: japicmp-report
          path: core/target/japicmp/

      - name: 'JReleaser output'
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7 — https://github.com/actions/upload-artifact/releases/tag/v7
        with:
          name: jreleaser-release
          path: |
            target/checkout/target/jreleaser/trace.log
            target/checkout/target/jreleaser/output.properties


  release-cli:
    if: inputs.release-cli
    needs: release
    permissions:
      contents: write
    uses: ./.github/workflows/release-cli.yml
    with:
      release-version: ${{ inputs.release-version }}
